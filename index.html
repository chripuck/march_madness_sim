// ============ CORE SIM ============
function gaussRandom() {
  let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
function teamStr(team, opp, round, w) {
  const offP=(366-team.adjO)/365, defP=(366-team.adjD)/365, emP=(366-team.kpRank)/365;
  const tW=w.offense+w.defense+w.overall;
  let s=(offP*w.offense+defP*w.defense+emP*w.overall)/tW*100;
  if(team.champProfile) s+=w.champBonus;
  s+=(team.exp/5)*w.experience*[0,0.15,0.35,0.65,0.85,1.0][Math.min(round,5)];
  s-=((366-opp.adjD)/365)*w.defSuppression;
  return s;
}
function simOnce(a,b,round,w) {
  let diff=teamStr(a,b,round,w)-teamStr(b,a,round,w);
  const vol=w.chaos*4+Math.abs(a.tempo-b.tempo)/365*w.tempo*6+(a.threeVar+b.threeVar)/2*w.threePt*4;
  diff+=gaussRandom()*vol;
  return Math.random()<1/(1+Math.exp(-diff*0.05))?a:b;
}

// Sim one matchup N times. Returns structured result.
function simMatchup(a,b,round,w,n) {
  let aW=0; for(let i=0;i<n;i++) if(simOnce(a,b,round,w).name===a.name) aW++;
  const aP=aW/n*100, bP=100-aP;
  const fav=aP>=bP?a:b, dog=aP>=bP?b:a;
  return { a, b, favPct:Math.max(aP,bP), dogPct:Math.min(aP,bP), fav, dog };
}

// ============ HISTORICAL TRUE-UP ============
// R64: expected upsets per seed tier (across all 4 regions)
const R64_UPSETS = {"1-16":0,"2-15":0,"3-14":1,"4-13":1,"5-12":1,"6-11":2,"7-10":2,"8-9":2};
// Later: expected upsets across entire round (all regions combined)
const LATER_UPSETS = {2:2, 3:1, 4:0};

function tierKey(a,b) { const lo=Math.min(a.seed,b.seed),hi=Math.max(a.seed,b.seed); return `${lo}-${hi}`; }

function trueUpR64(games) {
  // Group all 32 R64 games by seed tier, flip best underdogs to match historical rates
  const tiers={};
  games.forEach((g,i) => { const k=tierKey(g.a,g.b); if(!tiers[k])tiers[k]=[]; tiers[k].push({...g,i}); });
  const flips=new Set();
  for(const [key,tg] of Object.entries(tiers)) {
    const exp=R64_UPSETS[key]||0; if(!exp) continue;
    // Count natural upsets (higher seed# won)
    const natural=tg.filter(g=>g.winner.seed>Math.min(g.a.seed,g.b.seed)).length;
    const need=exp-natural; if(need<=0) continue;
    // Rank remaining chalk games by dogPct, flip top N
    const chalk=tg.filter(g=>g.winner.seed<=Math.min(g.a.seed,g.b.seed)).sort((a,b)=>b.dogPct-a.dogPct);
    for(let j=0;j<Math.min(need,chalk.length);j++) flips.add(chalk[j].i);
  }
  return flips;
}

function trueUpLater(games, roundNum) {
  const exp=LATER_UPSETS[roundNum]||0; if(!exp) return new Set();
  const natural=games.filter(g=>g.winner.seed>Math.min(g.a.seed,g.b.seed)).length;
  const need=exp-natural; if(need<=0) return new Set();
  const chalk=games.map((g,i)=>({...g,i}))
    .filter(g=>g.winner.seed<=Math.min(g.a.seed,g.b.seed))
    .filter(g=>g.dogPct>=20)
    .sort((a,b)=>b.dogPct-a.dogPct);
  const flips=new Set();
  for(let j=0;j<Math.min(need,chalk.length);j++) flips.add(chalk[j].i);
  return flips;
}

      const sim=simMatchup(a,b,1,w,n);
      let winner;
      if(mode==="chaos") winner=Math.random()*100<sim.favPct?sim.fav:sim.dog;
      else winner=sim.fav;
      return { a, b, winner, pct:sim.favPct, dogPct:sim.dogPct, dog:sim.dog, fav:sim.fav };
    });
  }

  // Step 2: True-up R64 for upside
  if(mode==="upside") {
    const flat=[]; REGIONS.forEach(rn=>allR64[rn].forEach((g,i)=>flat.push({...g,ri:rn,gi:i})));
    const flips=trueUpR64(flat);
    let idx=0;
    REGIONS.forEach(rn=>allR64[rn].forEach((g,i)=>{
      if(flips.has(idx)){g.winner=g.dog;g.pct=g.dogPct;g.flipped=true;}
      idx++;
    }));
  }

  // Step 3: For each region, lock R64 and sim round by round
  for(const rn of REGIONS) {
    const rounds=[];
    // R64
    const r64=allR64[rn].map(g=>({
      a:g.a, b:g.b, winner:g.winner,
      pct:(g.winner.name===g.fav.name?g.pct:g.dogPct).toFixed(0),
    }));
    rounds.push({name:roundNames[0],games:r64});
    let prev=r64.map(g=>g.winner);

    // R32, S16, E8
    for(let ri=1;ri<4;ri++) {
      const roundNum=ri+1;
      const pairs=[]; for(let i=0;i<prev.length;i+=2) pairs.push([prev[i],prev[i+1]]);

      const games=pairs.map(([a,b])=>{
        const sim=simMatchup(a,b,roundNum,w,n);
        let winner;
        if(mode==="chaos") winner=Math.random()*100<sim.favPct?sim.fav:sim.dog;
        else winner=sim.fav;
        return { a, b, winner, pct:sim.favPct, dogPct:sim.dogPct, dog:sim.dog, fav:sim.fav };
      });

      // True-up for upside
      if(mode==="upside" && games.length>1) {
        const flips=trueUpLater(games,roundNum);
        flips.forEach(idx=>{
          games[idx].winner=games[idx].dog;
          games[idx].flipped=true;
        });
      }

      const clean=games.map(g=>({
        a:g.a, b:g.b, winner:g.winner,
        pct:(g.winner.name===g.fav.name?g.pct:g.dogPct).toFixed(0),
      }));
      rounds.push({name:roundNames[ri],games:clean});
      prev=clean.map(g=>g.winner);
    }
    bracket.regions[rn]={rounds, champion:rounds[3].games[0].winner};
  }

  // Step 4: Final Four
  const s1a=bracket.regions[FF_MATCHUPS[0][0]].champion, s1b=bracket.regions[FF_MATCHUPS[0][1]].champion;
  const s2a=bracket.regions[FF_MATCHUPS[1][0]].champion, s2b=bracket.regions[FF_MATCHUPS[1][1]].champion;
  const sim1=simMatchup(s1a,s1b,5,w,n), sim2=simMatchup(s2a,s2b,5,w,n);
  const w1=mode==="chaos"?(Math.random()*100<sim1.favPct?sim1.fav:sim1.dog):sim1.fav;
  const w2=mode==="chaos"?(Math.random()*100<sim2.favPct?sim2.fav:sim2.dog):sim2.fav;
  const simF=simMatchup(w1,w2,5,w,n);
  const champ=mode==="chaos"?(Math.random()*100<simF.favPct?simF.fav:simF.dog):simF.fav;

  bracket.finalFour={
    semi1:{a:s1a,b:s1b,winner:w1,pct:(w1.name===sim1.fav.name?sim1.favPct:sim1.dogPct).toFixed(0)},
    semi2:{a:s2a,b:s2b,winner:w2,pct:(w2.name===sim2.fav.name?sim2.favPct:sim2.dogPct).toFixed(0)},
    final:{a:w1,b:w2,winner:champ,pct:(champ.name===simF.fav.name?simF.favPct:simF.dogPct).toFixed(0)},
  };
  return bracket;
}

// ============ LEADERBOARD ============
function runLeaderboard(w, n) {
  const ct={champ:{},f4:{},e8:{},s16:{}};
  for(let i=0;i<n;i++) {
    const b=generateBracket(w,1,"chaos");
    ct.champ[b.finalFour.final.winner.name]=(ct.champ[b.finalFour.final.winner.name]||0)+1;
    [b.finalFour.semi1.a,b.finalFour.semi1.b,b.finalFour.semi2.a,b.finalFour.semi2.b].forEach(t=>{ct.f4[t.name]=(ct.f4[t.name]||0)+1;});
    for(const r of Object.values(b.regions)){
      if(r.rounds[3]){const g=r.rounds[3].games[0];ct.e8[g.a.name]=(ct.e8[g.a.name]||0)+1;ct.e8[g.b.name]=(ct.e8[g.b.name]||0)+1;}
      if(r.rounds[2])r.rounds[2].games.forEach(g=>{ct.s16[g.a.name]=(ct.s16[g.a.name]||0)+1;ct.s16[g.b.name]=(ct.s16[g.b.name]||0)+1;});
    }
  }
  return Object.entries(ct.champ).map(([name,c])=>{
    const t=getTeam(name);
    return{name,seed:t.seed,region:t.region,kpRank:t.kpRank,champProfile:t.champProfile,
      champPct:(c/n*100).toFixed(1),f4Pct:((ct.f4[name]||0)/n*100).toFixed(1),
      e8Pct:((ct.e8[name]||0)/n*100).toFixed(1),s16Pct:((ct.s16[name]||0)/n*100).toFixed(1)};
  }).sort((a,b)=>b.champPct-a.champPct);
}

function Slider({label,value,onChange,desc}){
  return(<div style={{marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#374151",marginBottom:1}}>

      style={{width:"100%",accentColor:"#2563eb",height:4,cursor:"pointer"}}/>

function GameRow({g}){
  const loserSeed=g.winner?.name===g.a?.name?g.b?.seed:g.a?.seed;
  const isUpset=g.winner?.seed>loserSeed;
  return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"3px 0",fontSize:13}}>
    <span style={{color:"#9ca3af",width:18,textAlign:"right",fontSize:11}}>({g.a?.seed})</span>
    <span style={{color:g.winner?.name===g.a?.name?"#111827":"#9ca3af",fontWeight:g.winner?.name===g.a?.name?700:400,minWidth:110}}>{g.a?.name}</span>
    <span style={{color:"#d1d5db",fontSize:11}}>vs</span>
    <span style={{color:"#9ca3af",width:18,textAlign:"right",fontSize:11}}>({g.b?.seed})</span>
    <span style={{color:g.winner?.name===g.b?.name?"#111827":"#9ca3af",fontWeight:g.winner?.name===g.b?.name?700:400,minWidth:110}}>{g.b?.name}</span>
    <span style={{fontSize:10,color:isUpset?"#d97706":"#d1d5db",marginLeft:4}}>
      {g.pct?`${g.pct}%`:""}{isUpset?" UPSET":""}
    </span>
  </div>);
}

function BracketView({bracket}){
  if(!bracket)return null;
  return(<div>
    {REGIONS.map(rn=>{
      const rnds=bracket.regions[rn]?.rounds; if(!rnds)return null;
      const c=RC[rn];
      return(<div key={rn} style={{marginBottom:24}}>
        <h3 style={{color:c,fontSize:16,fontWeight:800,textTransform:"uppercase",letterSpacing:2,marginBottom:12,borderBottom:`2px solid ${c}22`,paddingBottom:6}}>{rn} Region</h3>
        {rnds.map((rd,ri)=>(<div key={ri} style={{marginBottom:12}}>

}

          </div>
          <div>
            <div style={{fontSize:10,color:"#d97706",textTransform:"uppercase",letterSpacing:2,marginBottom:8,fontWeight:800}}>Volatility Factors</div>
            <Slider label="Tempo Mismatch Impact" value={w.tempo} onChange={v=>up("tempo",v)} desc="How much a pace mismatch (fast team vs slow team) increases game-to-game randomness. High tempo gaps create more chaotic, unpredictable outcomes."/>
            <Slider label="3PT Variance" value={w.threePt} onChange={v=>up("threePt",v)} desc="How much three-point dependent teams swing between hot and cold. Teams that live by the three have higher ceilings but lower floors."/>
            <Slider label="Chaos Factor" value={w.chaos} onChange={v=>up("chaos",v)} desc="Pure randomness injected into every game. At 0, the better team almost always wins. At 10, anything can happen. This is March Madness - keep it above 2."/>
          </div>
          <div>
            <div style={{fontSize:10,color:"#7c3aed",textTransform:"uppercase",letterSpacing:2,marginBottom:8,fontWeight:800}}>Tournament Factors</div>
            <Slider label="Experience / Composure" value={w.experience} onChange={v=>up("experience",v)} desc="Bonus for upperclassman-heavy rosters. Scales up in later rounds - barely matters in R64, significant by the Elite Eight and Final Four."/>
            <Slider label="Def. Suppression" value={w.defSuppression} onChange={v=>up("defSuppression",v)} desc="How much an opponent's elite defense reduces your scoring output. Higher = elite defenses actively suppress the other team's offense in the sim."/>
            <Slider label="Champion Profile Bonus" value={w.champBonus} onChange={v=>up("champBonus",v)} desc="Flat bonus for teams meeting the historical championship threshold (top 21 offense + top 31 defense). 23 of 24 recent champs cleared this bar."/>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <button onClick={run} disabled={running}
            style={{padding:"10px 28px",background:running?"#d1d5db":"linear-gradient(135deg,#2563eb,#1d4ed8)",color:running?"#6b7280":"#ffffff",border:"none",borderRadius:6,fontWeight:800,fontSize:14,cursor:running?"wait":"pointer",textTransform:"uppercase",letterSpacing:1}}>
            {running?"Simulating...":"Run Simulation"}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <label style={{fontSize:11,color:"#6b7280"}}>Sims/game:</label>
            <select value={spg} onChange={e=>setSpg(Number(e.target.value))}
              style={{padding:"6px 10px",background:"#ffffff",color:"#111827",border:"1px solid #d1d5db",borderRadius:6,fontSize:12}}>
              <option value={100}>100</option><option value={500}>500</option>
              <option value={1000}>1,000</option><option value={2000}>2,000</option>
            </select>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <label style={{fontSize:11,color:"#6b7280"}}>Leaderboard runs:</label>
            <select value={lbN} onChange={e=>setLbN(Number(e.target.value))}
              style={{padding:"6px 10px",background:"#ffffff",color:"#111827",border:"1px solid #d1d5db",borderRadius:6,fontSize:12}}>
              <option value={500}>500</option><option value={1000}>1,000</option><option value={2000}>2,000</option>
            </select>
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{padding:"12px 20px",background:"#f0f4ff",borderBottom:"1px solid #e5e7eb"}}>
        <details>
          <summary style={{fontSize:12,fontWeight:700,color:"#1e40af",cursor:"pointer",userSelect:"none"}}>
            Guide & Glossary (click to expand)
          </summary>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16,marginTop:12,fontSize:11,color:"#374151",lineHeight:1.5}}>
            <div>
              <div style={{fontWeight:800,color:"#1e40af",textTransform:"uppercase",letterSpacing:1,fontSize:10,marginBottom:6}}>Simulation Settings</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700}}>Sims/Game</span> - How many times each individual matchup is simulated (e.g. Duke vs Siena played 1,000 times). Higher = more stable win percentages but slower to run.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700}}>Leaderboard Runs</span> - How many complete 67-game tournaments are simulated to generate championship probability rankings. Each run uses 1 sim per game with weighted randomness to explore all possible paths.</div>
            </div>
            <div>
              <div style={{fontWeight:800,color:"#1e40af",textTransform:"uppercase",letterSpacing:1,fontSize:10,marginBottom:6}}>Bracket Modes</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700,color:"#2563eb"}}>Chalk</span> - The safest bracket. Every game goes to the team that won the majority of its simulations. No upsets are forced. Best for small pools where getting the most games right matters.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700,color:"#d97706"}}>Upside</span> - Starts with chalk, then applies a historical true-up after each round. History tells us roughly how many upsets happen per seed matchup (e.g. 1 of 4 twelve-seeds typically beats a 5-seed). The model picks the most plausible underdogs to flip. Best for medium/large pools where you need differentiation.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700,color:"#dc2626"}}>Chaos</span> - Each game is decided by a single weighted dice roll based on the sim probabilities. A team with a 70% win rate wins 70% of the time, but the 30% underdog can hit. Produces a different bracket every run. Best for a fun second or third entry.</div>
            </div>
            <div>
              <div style={{fontWeight:800,color:"#1e40af",textTransform:"uppercase",letterSpacing:1,fontSize:10,marginBottom:6}}>Leaderboard Columns</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700}}>Champ%</span> - Percentage of simulated tournaments where this team won the national championship.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700}}>F4%</span> - Percentage of sims where this team reached the Final Four.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700}}>E8%</span> - Percentage of sims where this team reached the Elite Eight.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700}}>S16%</span> - Percentage of sims where this team reached the Sweet 16.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700}}>KP</span> - KenPom overall ranking (adjusted efficiency margin). #1 is the best team in the country.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700,color:"#b45309"}}>CP</span> - Championship Profile. Teams ranked top 21 in offensive efficiency AND top 31 in defensive efficiency. 23 of 24 recent national champions met this threshold.</div>
            </div>
            <div>
              <div style={{fontWeight:800,color:"#1e40af",textTransform:"uppercase",letterSpacing:1,fontSize:10,marginBottom:6}}>Bracket Labels</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700}}>Win %</span> - Shown next to each game winner. For chalk/upside, this is the percentage of sims that team won. For chaos, it's the probability that was used for the dice roll.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700,color:"#d97706"}}>UPSET</span> - Any game where the higher-numbered seed (underdog) won, regardless of mode.</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:700}}>Seed (#)</span> - The team's NCAA tournament seed, 1-16. Lower number = higher seed = expected to be stronger.</div>
            </div>
            <div>
              <div style={{fontWeight:800,color:"#1e40af",textTransform:"uppercase",letterSpacing:1,fontSize:10,marginBottom:6}}>How It Works</div>
              <div style={{marginBottom:6}}>The simulator uses KenPom adjusted offensive efficiency, defensive efficiency, and overall efficiency margin rankings for all 68 tournament teams. Each game is simulated using a Monte Carlo method: team strength scores are computed, volatility is added based on tempo mismatch and three-point dependence, and a random factor determines the outcome. Winners are locked after each round and used as inputs for the next round's matchups.</div>
              <div style={{marginBottom:6}}>The Upside bracket's historical true-up is based on actual NCAA tournament upset rates since 2001: 8v9 games split nearly 50/50, 5v12 upsets happen about 35% of the time, 4v13 about 21%, and so on.</div>
            </div>
          </div>
        </details>
      </div>

      {leaderboard&&(<div style={{padding:"0 20px 20px"}}>
        <div style={{display:"flex",gap:0,borderBottom:"1px solid #e5e7eb",marginBottom:16,paddingTop:12}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{padding:"8px 16px",background:"transparent",border:"none",borderBottom:tab===t.id?"2px solid #2563eb":"2px solid transparent",color:tab===t.id?"#2563eb":"#9ca3af",fontWeight:700,fontSize:12,cursor:"pointer",textTransform:"uppercase",letterSpacing:1}}>
              {t.label}
            </button>
          ))}
        </div>

        {tab==="leaderboard"&&(<div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:8}}>{lbN.toLocaleString()} full tournament simulations (1 sim/game each = pure weighted randomness)</div>
          <div style={{display:"grid",gridTemplateColumns:"auto 40px 1fr 65px 65px 65px 65px 55px",gap:0,fontSize:12}}>
            <div style={hdr}>Team</div><div style={hdr}>Seed</div><div style={{...hdr,paddingLeft:8}}>Region</div>
            <div style={{...hdr,textAlign:"right"}}>Champ%</div><div style={{...hdr,textAlign:"right"}}>F4%</div>
            <div style={{...hdr,textAlign:"right"}}>E8%</div><div style={{...hdr,textAlign:"right"}}>S16%</div>
            <div style={{...hdr,textAlign:"right"}}>KP</div>
            {leaderboard.slice(0,30).map((t,i)=>[
              <div key={`n${i}`} style={{...cell,fontWeight:700,color:t.champProfile?"#b45309":"#111827",display:"flex",alignItems:"center",gap:4}}>
                <span style={{color:"#d1d5db",fontSize:10,width:18,textAlign:"right"}}>{i+1}.</span>
                {t.name}
                {t.champProfile&&<span style={{fontSize:8,background:"#fef3c7",color:"#b45309",padding:"1px 4px",borderRadius:3,border:"1px solid #fde68a"}}>CP</span>}
              </div>,
              <div key={`s${i}`} style={cell}>{t.seed}</div>,
              <div key={`r${i}`} style={{...cell,paddingLeft:8}}>
                <span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:RC[t.region],marginRight:6}}/>{t.region}
              </div>,
              <div key={`c${i}`} style={{...cell,textAlign:"right",fontWeight:800,color:parseFloat(t.champPct)>10?"#1d4ed8":parseFloat(t.champPct)>5?"#2563eb":"#4b5563"}}>{t.champPct}%</div>,
              <div key={`f${i}`} style={{...cell,textAlign:"right",color:"#4b5563"}}>{t.f4Pct}%</div>,
              <div key={`e${i}`} style={{...cell,textAlign:"right",color:"#6b7280"}}>{t.e8Pct}%</div>,
              <div key={`s16${i}`} style={{...cell,textAlign:"right",color:"#9ca3af"}}>{t.s16Pct}%</div>,
              <div key={`k${i}`} style={{...cell,textAlign:"right",color:"#9ca3af"}}>#{t.kpRank}</div>,
            ])}
          </div>
          <div style={{marginTop:8,fontSize:10,color:"#9ca3af"}}><span style={{color:"#b45309"}}>CP</span> = Championship Profile (Top 21 AdjO + Top 31 AdjD)</div>
        </div>)}

        {tab==="chalk"&&(<div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:12}}>Every game simmed {spg.toLocaleString()} times. Favorite always wins. No true-up.</div>
          <BracketView bracket={chalk}/>
        </div>)}

        {tab==="upside"&&(<div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:12}}>
            Every game simmed {spg.toLocaleString()} times. After each round, historical true-up flips the best underdogs to match real upset rates.
            R64: ~{Object.values(R64_UPSETS).reduce((a,b)=>a+b,0)} upsets by seed tier. R32: ~{LATER_UPSETS[2]} upsets. S16: ~{LATER_UPSETS[3]} upset.
          </div>
          <BracketView bracket={upside}/>
        </div>)}

        {tab==="chaos"&&(<div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:12}}>Every game simmed {spg.toLocaleString()} times for probabilities, then a single dice roll decides each winner. Re-run for a new bracket.</div>
          <BracketView bracket={chaos}/>
        </div>)}
      </div>)}

      {!leaderboard&&(<div style={{padding:40,textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16}}>🏀</div>
        <div style={{fontSize:16,color:"#6b7280",marginBottom:8}}>Adjust weights and hit Run</div>
        <div style={{fontSize:12,color:"#9ca3af"}}>
          Each matchup simmed individually ({spg.toLocaleString()} times). Winners locked round by round.
          Upside bracket applies historical upset rates after each round.
        </div>
      </div>)}
    </div>
  </div>);
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
