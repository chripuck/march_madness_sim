// ============ ENGINE ============
function gaussRandom(){let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function teamStr(t,o,r,w){
  const oP=(366-t.adjO)/365,dP=(366-t.adjD)/365,eP=(366-t.kpRank)/365,tW=w.offense+w.defense+w.overall;
  let s=(oP*w.offense+dP*w.defense+eP*w.overall)/tW*100;
  s+=(t.exp/5)*w.experience*[0,.15,.35,.65,.85,1][Math.min(r,5)];
  s-=((366-o.adjD)/365)*w.defSuppression;
  if(r<=2 && t.homeCourt>0) s+=t.homeCourt*w.homeCourt*0.5;
  return s;
}
function simOnce(a,b,r,w){let d=teamStr(a,b,r,w)-teamStr(b,a,r,w);d+=gaussRandom()*(w.chaos*4+Math.abs(a.tempo-b.tempo)/365*w.tempo*6+(a.threeVar+b.threeVar)/2*w.threePt*4);return Math.random()<1/(1+Math.exp(-d*.05))?a:b;}
function simMatchup(a,b,r,w,n){let aW=0;for(let i=0;i<n;i++)if(simOnce(a,b,r,w).name===a.name)aW++;const aP=aW/n*100;return{a,b,favPct:Math.max(aP,100-aP),dogPct:Math.min(aP,100-aP),fav:aP>=50?a:b,dog:aP>=50?b:a};}

const R64_UPSETS={"1-16":0,"2-15":0,"3-14":1,"4-13":1,"5-12":1,"6-11":2,"7-10":2,"8-9":2};
const LATER_UPSETS={2:2,3:1,4:0};
function tierKey(a,b){return`${Math.min(a.seed,b.seed)}-${Math.max(a.seed,b.seed)}`;}
// Weighted random pick: given array of {i, dogPct}, pick one proportionally
function weightedPick(candidates){
  const total=candidates.reduce((s,c)=>s+c.dogPct,0);
  if(total<=0) return null;
  let roll=Math.random()*total;
  for(const c of candidates){ roll-=c.dogPct; if(roll<=0) return c; }
  return candidates[candidates.length-1];
}

function trueUpR64(games){const tiers={};games.forEach((g,i)=>{const k=tierKey(g.a,g.b);if(!tiers[k])tiers[k]=[];tiers[k].push({...g,i});});const flips=new Set();for(const[key,tg]of Object.entries(tiers)){const exp=R64_UPSETS[key]||0;if(!exp)continue;const nat=tg.filter(g=>g.winner.seed>Math.min(g.a.seed,g.b.seed)).length;const need=exp-nat;if(need<=0)continue;const ch=tg.filter(g=>g.winner.seed<=Math.min(g.a.seed,g.b.seed)&&g.dogPct>0);for(let j=0;j<Math.min(need,ch.length);j++){const pick=weightedPick(ch.filter(c=>!flips.has(c.i)));if(pick)flips.add(pick.i);}}return flips;}
function trueUpLater(games,rn){const exp=LATER_UPSETS[rn]||0;if(!exp)return new Set();const nat=games.filter(g=>g.winner.seed>Math.min(g.a.seed,g.b.seed)).length;if(exp-nat<=0)return new Set();const ch=games.map((g,i)=>({...g,i})).filter(g=>g.winner.seed<=Math.min(g.a.seed,g.b.seed)&&g.dogPct>=20&&Math.abs(g.a.seed-g.b.seed)<=3);const f=new Set();for(let j=0;j<Math.min(exp-nat,ch.length);j++){const pick=weightedPick(ch.filter(c=>!f.has(c.i)));if(pick)f.add(pick.i);}return f;}

// Pick winner with CP filter applied (for FF and championship)
// If one team is CP and the other isn't, the non-CP team's win prob is halved
function cpAdjustedRoll(sim){
  let aP = sim.a === sim.fav ? sim.favPct : sim.dogPct;
  let bP = 100 - aP;
  const aCP = sim.a.champProfile, bCP = sim.b.champProfile;
  if(aCP && !bCP){ bP = bP * 0.5; aP = 100 - bP; }
  else if(!aCP && bCP){ aP = aP * 0.5; bP = 100 - aP; }
  const winner = Math.random()*100 < aP ? sim.a : sim.b;
  const pct = winner.name === sim.a.name ? aP : bP;
  return { winner, pct };
}

function getT(name,ff){if(name==="FF_MW_16")return ff["UMBC|Howard"];if(name==="FF_MW_11")return ff["SMU|Miami OH"];if(name==="FF_WEST_11")return ff["Texas|NC State"];if(name==="FF_SOUTH_16")return ff["Prairie View|Lehigh"];return getTeam(name);}

// UPSIDE_DICE_ROUND: starting at this round number, upside mode uses weighted dice instead of always picking favorite
const UPSIDE_DICE_FROM = 4; // 4 = Elite Eight only

function generateBracket(w,n,mode){const ff={};for(const[a,b]of FIRST_FOUR){const r=simMatchup(getTeam(a),getTeam(b),0,w,n);ff[a+"|"+b]=r.fav;}const rNames=["R64","R32","S16","E8"];const bracket={regions:{}};const allR64={};for(const rn of REGIONS){allR64[rn]=REGION_MATCHUPS[rn].map(([an,bn])=>{const a=getT(an,ff),b=getT(bn,ff),sim=simMatchup(a,b,1,w,n);let winner=mode==="chaos"?(Math.random()*100<sim.favPct?sim.fav:sim.dog):sim.fav;return{a,b,winner,pct:sim.favPct,dogPct:sim.dogPct,dog:sim.dog,fav:sim.fav};});}
if(mode==="upside"){const flat=[];REGIONS.forEach(rn=>allR64[rn].forEach((g,i)=>flat.push({...g,ri:rn,gi:i})));const flips=trueUpR64(flat);let idx=0;REGIONS.forEach(rn=>allR64[rn].forEach(g=>{if(flips.has(idx)){g.winner=g.dog;g.pct=g.dogPct;}idx++;}));}
for(const rn of REGIONS){const rounds=[];const r64=allR64[rn].map(g=>({a:g.a,b:g.b,winner:g.winner,pct:(g.winner.name===g.fav.name?g.pct:g.dogPct).toFixed(0)}));rounds.push({name:rNames[0],games:r64});let prev=r64.map(g=>g.winner);for(let ri=1;ri<4;ri++){const rNum=ri+1,pairs=[];for(let i=0;i<prev.length;i+=2)pairs.push([prev[i],prev[i+1]]);const games=pairs.map(([a,b])=>{const sim=simMatchup(a,b,rNum,w,n);let winner;
if(mode==="chaos"){ winner=Math.random()*100<sim.favPct?sim.fav:sim.dog; }
else if(mode==="upside"&&rNum>=UPSIDE_DICE_FROM){ winner=Math.random()*100<sim.favPct?sim.fav:sim.dog; }
else{ winner=sim.fav; }
return{a,b,winner,pct:sim.favPct,dogPct:sim.dogPct,dog:sim.dog,fav:sim.fav};});if(mode==="upside"&&rNum<UPSIDE_DICE_FROM&&games.length>1){trueUpLater(games,rNum).forEach(idx=>{games[idx].winner=games[idx].dog;});}const cl=games.map(g=>({a:g.a,b:g.b,winner:g.winner,pct:(g.winner.name===g.fav.name?g.pct:g.dogPct).toFixed(0)}));rounds.push({name:rNames[ri],games:cl});prev=cl.map(g=>g.winner);}bracket.regions[rn]={rounds,champion:rounds[3].games[0].winner};}
// Final Four with CP filter
const s1a=bracket.regions[FF_MATCHUPS[0][0]].champion,s1b=bracket.regions[FF_MATCHUPS[0][1]].champion,s2a=bracket.regions[FF_MATCHUPS[1][0]].champion,s2b=bracket.regions[FF_MATCHUPS[1][1]].champion;
const sim1=simMatchup(s1a,s1b,5,w,n),sim2=simMatchup(s2a,s2b,5,w,n);
let w1,w2,champ;
if(mode==="chalk"){ w1=sim1.fav; w2=sim2.fav; const simF=simMatchup(w1,w2,5,w,n); champ=simF.fav;
  bracket.finalFour={semi1:{a:s1a,b:s1b,winner:w1,pct:(w1.name===sim1.fav.name?sim1.favPct:sim1.dogPct).toFixed(0)},semi2:{a:s2a,b:s2b,winner:w2,pct:(w2.name===sim2.fav.name?sim2.favPct:sim2.dogPct).toFixed(0)},final:{a:w1,b:w2,winner:champ,pct:(champ.name===simF.fav.name?simF.favPct:simF.dogPct).toFixed(0)}};
} else {
  // Upside and Chaos: weighted dice roll with CP filter
  const r1=cpAdjustedRoll(sim1); w1=r1.winner;
  const r2=cpAdjustedRoll(sim2); w2=r2.winner;
  const simF=simMatchup(w1,w2,5,w,n);
  const rF=cpAdjustedRoll(simF); champ=rF.winner;
  bracket.finalFour={semi1:{a:s1a,b:s1b,winner:w1,pct:r1.pct.toFixed(0)},semi2:{a:s2a,b:s2b,winner:w2,pct:r2.pct.toFixed(0)},final:{a:w1,b:w2,winner:champ,pct:rF.pct.toFixed(0)}};
}
return bracket;}

function runLeaderboard(w,n){const ct={champ:{},f4:{},e8:{},s16:{}};for(let i=0;i<n;i++){const b=generateBracket(w,1,"chaos");ct.champ[b.finalFour.final.winner.name]=(ct.champ[b.finalFour.final.winner.name]||0)+1;[b.finalFour.semi1.a,b.finalFour.semi1.b,b.finalFour.semi2.a,b.finalFour.semi2.b].forEach(t=>{ct.f4[t.name]=(ct.f4[t.name]||0)+1;});for(const r of Object.values(b.regions)){if(r.rounds[3]){const g=r.rounds[3].games[0];ct.e8[g.a.name]=(ct.e8[g.a.name]||0)+1;ct.e8[g.b.name]=(ct.e8[g.b.name]||0)+1;}if(r.rounds[2])r.rounds[2].games.forEach(g=>{ct.s16[g.a.name]=(ct.s16[g.a.name]||0)+1;ct.s16[g.b.name]=(ct.s16[g.b.name]||0)+1;});}}return Object.entries(ct.champ).map(([name,c])=>{const t=getTeam(name);return{name,seed:t.seed,region:t.region,kpRank:t.kpRank,champProfile:t.champProfile,champPct:(c/n*100).toFixed(1),f4Pct:((ct.f4[name]||0)/n*100).toFixed(1),e8Pct:((ct.e8[name]||0)/n*100).toFixed(1),s16Pct:((ct.s16[name]||0)/n*100).toFixed(1)};}).sort((a,b)=>b.champPct-a.champPct);}

        <div style={{display:"flex",alignItems:"center",gap:3,overflow:"hidden",flex:1,minWidth:0}}>
          {logo&&<img src={logo} alt="" style={{width:14,height:14,objectFit:"contain",flexShrink:0}} onError={e=>{e.target.style.display='none'}}/>}
          <span style={{color:won?"#111":"#aaa",fontWeight:won?700:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontSize:10}}>
            <span style={{color:"#9ca3af",marginRight:2}}>{t?.seed}</span>{t?.name}
          </span>
        </div>
        {won&&<span style={{color:"#6b7280",fontSize:9,flexShrink:0,marginLeft:2}}>{pct}%</span>}
      </div>
    );
  };
  return(
    <div style={{width:"100%",border:"1px solid "+(upset?"#f59e0b":"#d1d5db"),borderRadius:3,background:upset?"#fffbeb":"#fff",overflow:"hidden"}}>
      <TeamRow t={g.a} won={aW} pct={aW?g.pct:null}/>
      <div style={{height:1,background:"#f3f4f6"}}/>
      <TeamRow t={g.b} won={bW} pct={bW?g.pct:null}/>
    </div>
  );
}

function HalfBracket({leftRounds,rightRounds,leftLabel,rightLabel,leftColor,rightColor}){
  if(!leftRounds||!rightRounds) return null;
  return(
    <div style={{flex:1,display:"flex",minHeight:330}}>
      {/* Left region: R64 -> R32 -> S16 -> E8 */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <div style={{fontSize:14,fontWeight:900,color:leftColor,textTransform:"uppercase",letterSpacing:2,padding:"2px 4px"}}>{leftLabel}</div>
        <div style={{flex:1,display:"flex",alignItems:"stretch"}}>
          <RCol9 games={leftRounds[0].games}/>
          <Conn count={8}/><ConnIn count={4}/>
          <RCol9 games={leftRounds[1].games}/>
          <Conn count={4}/><ConnIn count={2}/>
          <RCol9 games={leftRounds[2].games}/>
          <Conn count={2}/><ConnIn count={1}/>
          <RCol9 games={leftRounds[3].games}/>
        </div>
      </div>
      {/* Spacer for center column alignment */}
      <div style={{width:170,flexShrink:0}}/>
      {/* Right region: E8 <- S16 <- R32 <- R64 */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <div style={{fontSize:14,fontWeight:900,color:rightColor,textTransform:"uppercase",letterSpacing:2,padding:"2px 4px",textAlign:"right"}}>{rightLabel}</div>
        <div style={{flex:1,display:"flex",alignItems:"stretch"}}>
          <RCol9 games={rightRounds[3].games}/>
          <ConnR count={2}/><ConnInR count={2}/>
          <RCol9 games={rightRounds[2].games}/>
          <ConnR count={4}/><ConnInR count={4}/>
          <RCol9 games={rightRounds[1].games}/>
          <ConnR count={8}/><ConnInR count={8}/>
          <RCol9 games={rightRounds[0].games}/>
        </div>
      </div>
    </div>
  );
}

function FullBracket({bracket}){
  if(!bracket)return null;
  const ff=bracket.finalFour;
  const champLogo=logoUrl(ff.final.winner?.name);
  return(
    <div style={{flex:1,overflow:"auto",padding:"6px 10px",display:"flex",flexDirection:"column",position:"relative"}}>
      {/* Top half */}
      <HalfBracket
        leftRounds={bracket.regions.East?.rounds} leftLabel="East" leftColor={RC.East}
        rightRounds={bracket.regions.West?.rounds} rightLabel="West" rightColor={RC.West}
      />
      <div style={{height:1,background:"#e5e7eb",margin:"2px 0",flexShrink:0}}/>
      {/* Bottom half */}
      <HalfBracket
        leftRounds={bracket.regions.South?.rounds} leftLabel="South" leftColor={RC.South}
        rightRounds={bracket.regions.Midwest?.rounds} rightLabel="Midwest" rightColor={RC.Midwest}
      />
      {/* FF overlay centered */}
      <div style={{position:"absolute",top:0,bottom:0,left:"50%",transform:"translateX(-50%)",width:170,display:"flex",alignItems:"center",pointerEvents:"none"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,width:"100%",pointerEvents:"auto",padding:"0 4px"}}>
          <div style={{fontSize:11,color:"#7c3aed",textTransform:"uppercase",letterSpacing:2,fontWeight:900}}>Final Four</div>
          <MBox9 g={ff.semi1}/>
          <div style={{fontSize:8,color:"#9ca3af",textAlign:"center"}}>East / West</div>
          <div style={{padding:12,background:"linear-gradient(135deg,#ede9fe,#ddd6fe)",borderRadius:8,textAlign:"center",width:"100%",border:"2px solid #c4b5fd",boxShadow:"0 2px 12px rgba(124,58,237,.15)"}}>
            <div style={{fontSize:9,color:"#7c3aed",textTransform:"uppercase",letterSpacing:2,fontWeight:700,marginBottom:4}}>Champion</div>
            {champLogo&&<img src={champLogo} alt="" style={{width:44,height:44,objectFit:"contain",display:"block",margin:"0 auto 4px"}} onError={e=>{e.target.style.display='none'}}/>}
            <div style={{fontSize:20,fontWeight:900,color:"#111"}}>{ff.final.winner?.name}</div>
            <div style={{fontSize:11,color:"#7c3aed",marginTop:2}}>({ff.final.winner?.seed}) {ff.final.pct}%</div>
          </div>
          <div style={{fontSize:8,color:"#9ca3af",textAlign:"center"}}>South / Midwest</div>
          <MBox9 g={ff.semi2}/>
        </div>
      </div>
    </div>
  );
}

function Leaderboard({data}){
  if(!data)return null;
  const h={padding:"4px 3px",fontSize:9,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,borderBottom:"1px solid #e5e7eb",fontWeight:700};
  const c={padding:"3px",borderBottom:"1px solid #f3f4f6",color:"#4b5563",fontSize:11};
  return(<div style={{padding:"8px 12px",overflow:"auto",flex:1}}>
    <div style={{display:"grid",gridTemplateColumns:"auto 30px 68px 55px 55px 55px 55px 38px",gap:0}}>
      <div style={h}>Team</div><div style={h}>Sd</div><div style={{...h,paddingLeft:4}}>Region</div>
      <div style={{...h,textAlign:"right"}}>Chmp%</div><div style={{...h,textAlign:"right"}}>F4%</div>
      <div style={{...h,textAlign:"right"}}>E8%</div><div style={{...h,textAlign:"right"}}>S16%</div>
      <div style={{...h,textAlign:"right"}}>KP</div>
      {data.slice(0,25).map((t,i)=>[
        <div key={`n${i}`} style={{...c,fontWeight:700,color:t.champProfile?"#b45309":"#111",display:"flex",alignItems:"center",gap:3}}><span style={{color:"#ccc",fontSize:9,width:14,textAlign:"right"}}>{i+1}</span>{t.name}{t.champProfile&&<span style={{fontSize:7,background:"#fef3c7",color:"#b45309",padding:"0 3px",borderRadius:2}}>CP</span>}</div>,
        <div key={`s${i}`} style={c}>{t.seed}</div>,
        <div key={`r${i}`} style={{...c,paddingLeft:4}}><span style={{display:"inline-block",width:6,height:6,borderRadius:1,background:RC[t.region],marginRight:4}}/>{t.region}</div>,
        <div key={`c${i}`} style={{...c,textAlign:"right",fontWeight:800,color:+t.champPct>10?"#1d4ed8":+t.champPct>5?"#2563eb":"#4b5563"}}>{t.champPct}%</div>,
        <div key={`f${i}`} style={{...c,textAlign:"right"}}>{t.f4Pct}%</div>,
        <div key={`e${i}`} style={{...c,textAlign:"right",color:"#6b7280"}}>{t.e8Pct}%</div>,
        <div key={`s16${i}`} style={{...c,textAlign:"right",color:"#9ca3af"}}>{t.s16Pct}%</div>,
        <div key={`k${i}`} style={{...c,textAlign:"right",color:"#9ca3af"}}>#{t.kpRank}</div>,
      ])}
    </div>
  </div>);
}

function App(){
  const[w,setW]=useState(DEFAULT_W);
  const[lb,setLb]=useState(null);
  const[chalk,setChalk]=useState(null);
  const[upside,setUpside]=useState(null);
  const[chaos,setChaos]=useState(null);
  const[tab,setTab]=useState("upside");
  const[running,setRunning]=useState(false);
  const[spg,setSpg]=useState(1000);
  const[lbN,setLbN]=useState(1000);
  const up=useCallback((k,v)=>setW(p=>({...p,[k]:v})),[]);
  const run=useCallback(()=>{setRunning(true);setTimeout(()=>{setLb(runLeaderboard(w,lbN));setChalk(generateBracket(w,spg,"chalk"));setUpside(generateBracket(w,spg,"upside"));setChaos(generateBracket(w,spg,"chaos"));setRunning(false);},50);},[w,spg,lbN]);
  const tabs=[{id:"chalk",label:"Chalk",d:"Favorite wins every game"},{id:"upside",label:"Upside",d:"True-up + dice roll + CP filter"},{id:"chaos",label:"Chaos",d:"Weighted dice roll + CP filter"},{id:"leaderboard",label:"Stats",d:"Championship probability rankings"}];
  const active=tab==="chalk"?chalk:tab==="upside"?upside:tab==="chaos"?chaos:null;

  return(
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:"#e5e7eb",fontFamily:"'Segoe UI',Tahoma,sans-serif",padding:8}}>
      {/* Picture frame */}
      <div style={{display:"flex",width:"100%",maxWidth:1920,height:"calc(100vh - 16px)",background:"#fff",borderRadius:8,boxShadow:"0 4px 24px rgba(0,0,0,.12)",overflow:"hidden",border:"1px solid #d1d5db"}}>
        {/* Sidebar */}
        <div style={{width:240,background:"#f9fafb",borderRight:"1px solid #e5e7eb",display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(135deg,#1e3a5f,#1e40af)",padding:"10px 12px",flexShrink:0}}>
            <div style={{fontSize:18,fontWeight:900,letterSpacing:-.5}}><span style={{color:"#93c5fd"}}>MARCH</span> <span style={{color:"#fbbf24"}}>MADNESS</span></div>
            <div style={{fontSize:9,color:"#93c5fd",textTransform:"uppercase",letterSpacing:1.5}}>Monte Carlo Simulator 2026</div>
          </div>
          <div style={{padding:"8px 12px",borderBottom:"1px solid #e5e7eb",flexShrink:0}}>
            <button onClick={run} disabled={running} style={{width:"100%",padding:"7px",background:running?"#d1d5db":"linear-gradient(135deg,#2563eb,#1d4ed8)",color:running?"#6b7280":"#fff",border:"none",borderRadius:5,fontWeight:800,fontSize:11,cursor:running?"wait":"pointer",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{running?"Simulating...":"Run Simulation"}</button>
            <div style={{display:"flex",gap:6}}>
              <div style={{flex:1}}><div style={{fontSize:8,color:"#6b7280",marginBottom:1}}>Sims/Game</div><select value={spg} onChange={e=>setSpg(+e.target.value)} style={{width:"100%",padding:"3px",background:"#fff",border:"1px solid #d1d5db",borderRadius:3,fontSize:10}}><option value={100}>100</option><option value={500}>500</option><option value={1000}>1K</option><option value={2000}>2K</option></select></div>
              <div style={{flex:1}}><div style={{fontSize:8,color:"#6b7280",marginBottom:1}}>LB Runs</div><select value={lbN} onChange={e=>setLbN(+e.target.value)} style={{width:"100%",padding:"3px",background:"#fff",border:"1px solid #d1d5db",borderRadius:3,fontSize:10}}><option value={500}>500</option><option value={1000}>1K</option><option value={2000}>2K</option></select></div>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"8px 12px",fontSize:11}}>
            <div style={{fontSize:9,color:"#2563eb",textTransform:"uppercase",letterSpacing:1.5,fontWeight:800,marginBottom:4}}>Power</div>
            <Sl label="Offense" value={w.offense} onChange={v=>up("offense",v)} desc="KenPom adjusted offensive efficiency weight"/>
            <Sl label="Defense" value={w.defense} onChange={v=>up("defense",v)} desc="KenPom adjusted defensive efficiency weight"/>
            <Sl label="Overall (AdjEM)" value={w.overall} onChange={v=>up("overall",v)} desc="Combined efficiency margin + strength of schedule"/>
            <div style={{fontSize:9,color:"#d97706",textTransform:"uppercase",letterSpacing:1.5,fontWeight:800,marginBottom:4,marginTop:6}}>Volatility</div>
            <Sl label="Tempo Mismatch" value={w.tempo} onChange={v=>up("tempo",v)} desc="Pace mismatch increases randomness"/>
            <Sl label="3PT Variance" value={w.threePt} onChange={v=>up("threePt",v)} desc="Three-point teams swing hot/cold"/>
            <Sl label="Chaos" value={w.chaos} onChange={v=>up("chaos",v)} desc="Pure randomness. Keep above 2"/>
            <div style={{fontSize:9,color:"#7c3aed",textTransform:"uppercase",letterSpacing:1.5,fontWeight:800,marginBottom:4,marginTop:6}}>Tournament</div>
            <Sl label="Experience" value={w.experience} onChange={v=>up("experience",v)} desc="Upperclassman bonus, scales in later rounds"/>
            <Sl label="Def. Suppression" value={w.defSuppression} onChange={v=>up("defSuppression",v)} desc="Elite D reduces opponent offense"/>
            <Sl label="Home Court" value={w.homeCourt} onChange={v=>up("homeCourt",v)} desc="Boost for teams playing near home in R64/R32. Missouri (St. Louis), USF (Tampa), Villanova (Philly), etc."/>
            <div style={{padding:"6px 8px",background:"#fef3c7",borderRadius:4,fontSize:9,color:"#92400e",lineHeight:1.3,marginTop:4}}>
              <b>Championship Profile Filter:</b> Non-CP teams get win probability halved in Final Four & Championship. 23/24 recent champs met this bar.
            </div>
            <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #e5e7eb",fontSize:9,color:"#6b7280",lineHeight:1.4}}>
              <div style={{fontWeight:700,marginBottom:4,textTransform:"uppercase",letterSpacing:1,color:"#374151"}}>Glossary</div>
              <p style={{marginBottom:3}}><b style={{color:"#2563eb"}}>Chalk:</b> Favorite always wins. Small pools.</p>
              <p style={{marginBottom:3}}><b style={{color:"#d97706"}}>Upside:</b> Historical true-up in R64/R32. Dice roll in S16+. CP filter in Final Four.</p>
              <p style={{marginBottom:3}}><b style={{color:"#dc2626"}}>Chaos:</b> Weighted dice roll. CP filter in Final Four.</p>
              <p style={{marginBottom:3}}><b style={{color:"#b45309"}}>CP:</b> Championship Profile. Non-CP teams get win% halved in FF and title game.</p>
              <p style={{marginBottom:3}}><b>KP:</b> KenPom overall rank. <b>UPSET:</b> Higher seed won.</p>
              <p style={{marginBottom:3}}><b>Sims/Game:</b> Times each matchup is played.</p>
              <p style={{marginBottom:0}}><b>LB Runs:</b> Full tournaments for championship odds.</p>
            </div>
          </div>
        </div>
        {/* Main */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"#fff"}}>
          <div style={{display:"flex",borderBottom:"1px solid #e5e7eb",flexShrink:0,background:"#fafafa"}}>
            {tabs.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 14px",background:"transparent",border:"none",borderBottom:tab===t.id?"2px solid #2563eb":"2px solid transparent",color:tab===t.id?"#2563eb":"#9ca3af",fontWeight:700,fontSize:11,cursor:"pointer",textTransform:"uppercase",letterSpacing:1,display:"flex",flexDirection:"column",alignItems:"center"}}><span>{t.label}</span><span style={{fontSize:8,fontWeight:400,color:tab===t.id?"#60a5fa":"#ccc",textTransform:"none"}}>{t.d}</span></button>))}
          </div>
          {!chalk&&(<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",color:"#9ca3af"}}><div style={{fontSize:48,marginBottom:12}}>🏀</div><div style={{fontSize:14}}>Adjust weights and hit Run</div></div>)}
          {tab==="leaderboard"&&lb&&<Leaderboard data={lb}/>}
          {tab!=="leaderboard"&&active&&<FullBracket bracket={active}/>}
        </div>
      </div>
    </div>
  );
}
ReactDOM.render(<App/>, document.getElementById("root"));
</script></body></html>
